spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:voc_actionops_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    placeholders:
      timestamp_type: TIMESTAMP(6)

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

security:
  jwt:
    secret: voc-actionops-test-jwt-secret-key-2026
