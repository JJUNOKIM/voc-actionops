spring:
  application:
    name: voc-actionops
  profiles:
    default: local
  flyway:
    placeholders:
      timestamp_type: DATETIME(6)
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

info:
  app:
    name: VOC ActionOps
    description: Customer feedback operations platform
    version: ${APP_VERSION:local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

security:
  jwt:
    issuer: voc-actionops
    secret: ${JWT_SECRET}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:30m}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:14d}

app:
  dataset-upload:
    storage-directory: ${DATASET_UPLOAD_DIRECTORY:./data/uploads}
    max-file-size-bytes: ${DATASET_UPLOAD_MAX_FILE_SIZE_BYTES:5242880}
    max-records: ${DATASET_UPLOAD_MAX_RECORDS:10000}
