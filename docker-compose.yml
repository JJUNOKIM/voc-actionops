name: voc-actionops

services:
  mysql:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-voc_actionops}
      MYSQL_USER: ${MYSQL_USER:-local_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local_password}
      TZ: Asia/Seoul
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ai-worker:
    build:
      context: ./ai-worker
    ports:
      - "${AI_WORKER_PORT:-8000}:8000"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-deterministic}
      AI_WORKER_API_KEY: ${AI_WORKER_API_KEY:-local-ai-worker-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-luna}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-30}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  mysql-data:
  redis-data:
