name: AI Worker CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "ai-worker/**"
      - ".github/workflows/ai-worker-ci.yml"
  push:
    branches:
      - main
    paths:
      - "ai-worker/**"
      - ".github/workflows/ai-worker-ci.yml"

permissions:
  contents: read

concurrency:
  group: ai-worker-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: ai-worker/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        env:
          AI_WORKER_API_KEY: test-internal-api-key
        run: pytest

      - name: Build container image
        run: docker build -t voc-actionops-ai-worker .
